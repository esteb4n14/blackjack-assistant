            <div class="input-grupo">

                    <option value="6">6</option><option value="7">7</option>
                    <option value="8">8</option><option value="9">9</option>
                    <option value="10">10, J, Q, K</option><option value="11">As (A)</option>
                </select>
            </div>
        </div>

        <button id="btnAnalizar">Analizar Jugada</button>

        <div id="resultado" class="resultado-panel">--</div>
    </div>
    <script src="script.js"></script>

</html>
